name: Create Flashable Zip

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Zip
        run: |
          # Zips the core files into your custom named zip
          zip -r nezha_leica_camera_enabler_by_mexus.zip module.prop system.prop README.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nezha_leica_camera_enabler
          path: nezha_leica_camera_enabler_by_mexus.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: nezha_leica_camera_enabler_by_mexus.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}